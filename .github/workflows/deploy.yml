name: Deploy Auto-Sync Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  auto-sync:
    name: Sync Code & Restart Services
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/saas-project
            chmod +x deploy/auto-sync.sh
            ./deploy/auto-sync.sh
